<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>안녕하세요</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          "Pretendard",
          "Noto Sans KR",
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #f6f4ef;
        color: #1f2933;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.85), transparent 28rem),
          linear-gradient(135deg, #f6f4ef 0%, #dce7e2 48%, #f3d7c7 100%);
      }

      main {
        width: min(100%, 720px);
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(48px, 12vw, 112px);
        line-height: 1.05;
        letter-spacing: 0;
      }

      p {
        margin: 24px auto 0;
        max-width: 36rem;
        font-size: clamp(18px, 3vw, 24px);
        line-height: 1.6;
        color: #43515c;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>안녕하세요.</h1>
      <p>방문해 주셔서 감사합니다.</p>
    </main>
  </body>
</html>
