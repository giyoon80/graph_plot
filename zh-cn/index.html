  <h1>从图表图片中提取数值</h1>
  <p>图表数值提取器可将图表截图中的点和曲线转换为可重复使用的X/Y数据。所有处理均在浏览器中完成，支持数值轴、日期轴、线性和对数刻度、多组数据系列以及CSV导出。</p>
  <a class="cta" href="/?lang=zh-CN">打开图表数值提取器</a>
  <h2>使用方法</h2>
  <ol><li>上传PNG或JPG格式的图表截图。</li><li>在X轴和Y轴上分别标记两个参考点并输入对应数值。</li><li>点击图表中的数据点或曲线。</li><li>检查计算出的X/Y数值并下载CSV文件。</li></ol>
  <h2>在浏览器中保护数据</h2>
  <p>图像和坐标计算均保留在浏览器中。无需将原始图像上传到网站，也可以将项目保存为JSON文件供以后继续处理。</p>
